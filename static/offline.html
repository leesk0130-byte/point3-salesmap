<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">
<title>Point3 CRM - 오프라인</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8fafc;
    color: #0f172a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .container { max-width: 400px; }
  .icon {
    width: 80px; height: 80px;
    margin: 0 auto 24px;
    background: #eef2ff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; color: #1e293b; }
  p { font-size: 15px; color: #64748b; line-height: 1.6; margin-bottom: 24px; }
  .btn {
    display: inline-block;
    padding: 12px 28px;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .btn:active { transform: scale(0.97); }
  @media (prefers-color-scheme: dark) {
    body { background: #0f172a; color: #f1f5f9; }
    h1 { color: #e2e8f0; }
    p { color: #94a3b8; }
    .icon { background: #1e1b4b; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128268;</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인한 후 다시 시도해주세요. 연결이 복원되면 자동으로 동기화됩니다.</p>
    <button class="btn" onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
