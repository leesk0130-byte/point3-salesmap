            <div class="spinner"></div>
            <div class="loading-text">데이터를 불러오는 중...</div>
        </div>
    </div>

    <script>
        // ── 다크모드 토글 ──
        (function initDarkMode() {
            const saved = localStorage.getItem('darkMode');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = saved !== null ? saved === 'true' : prefersDark;
            if (isDark) document.body.classList.add('dark');
            updateDarkUI(isDark);

            document.getElementById('darkToggle').addEventListener('click', function() {
                const dark = document.body.classList.toggle('dark');
                localStorage.setItem('darkMode', dark);
                updateDarkUI(dark);
            });

            function updateDarkUI(dark) {
                const toggle = document.getElementById('darkToggle');
                toggle.innerHTML = dark ? '&#9790;' : '&#9728;';
                toggle.title = dark ? '라이트모드로 전환' : '다크모드로 전환';
                const meta = document.getElementById('themeColor');
                if (meta) meta.content = dark ? '#0f172a' : '#ffffff';
            }
        })();

        const MARKER_STATUS_COLORS = {
            '미컨택':   '#ef4444',   // 빨강
            '명함전달': '#4f46e5',   // 인디고
            '미팅대기': '#f59e0b',   // 앰버
            '미팅완료': '#10b981',   // 에메랄드
            'personal': '#374151'    // 다크그레이
        };

        const MAP_PIN_ICON = '<path d="M10 1C6.13 1 3 4.13 3 8c0 5.25 7 11 7 11s7-5.75 7-11c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/>';
        const HOME_ICON = '<path d="M10 2L3 9h2v7h4v-4h2v4h4V9h2L10 2z"/>';

        const STATUS_MAP = {'미방문':'미컨택','부재중':'미컨택','계약성사':'미팅완료','실패':'미컨택','기타':'미컨택'};
        const VALID_STATUSES = ['미컨택','명함전달','미팅대기','미팅완료'];
        function getStoreStatus(store) {
            const lv = getLastVisit(store);
            if (!lv) return '미컨택';
            const raw = lv.result || '미컨택';
            return STATUS_MAP[raw] || (VALID_STATUSES.includes(raw) ? raw : '미컨택');
        }

        function buildMarkerHtml(store) {
            const personal = store.name==='집' || store.name==='회사';
            const status = personal ? 'personal' : getStoreStatus(store);
            const color = MARKER_STATUS_COLORS[status] || MARKER_STATUS_COLORS['미컨택'];
            const icon = personal ? HOME_ICON : MAP_PIN_ICON;

            const starHtml = !personal && store.starred ? '<div class="cm-star">★</div>' : '';
            return `<div class="cm-wrapper${personal?' cm-personal':''}">
                ${starHtml}
                <div class="cm-pin">
                    <svg viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 0C7.6 0 1 6.6 1 14.4c0 10.8 15 25.6 15 25.6s15-14.8 15-25.6C31 6.6 24.4 0 16 0z" fill="${color}"/>
                        <circle cx="16" cy="14" r="9" fill="rgba(255,255,255,.2)"/>
                    </svg>
                    <div class="cm-icon"><svg viewBox="0 0 20 20" fill="#fff">${icon}</svg></div>
                </div>
            </div>`;
        }

        let allStores = [], markers = {}, activeDistrict = null, activeStatus = null, searchQuery = '';
        let sortMode = 'default';
        let filterStarred = false;
        let sidebarOpen = true, isMobile = window.innerWidth <= 768, activeCardId = null;

        const koreaB = L.latLngBounds([33.0, 124.5], [38.7, 132.0]);
        const map = L.map('map', {
            center: [36.5, 127.8], zoom: 7, zoomControl: false,
            maxBounds: koreaB.pad(0.1),
            maxBoundsViscosity: 1.0,
            minZoom: 7
        });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://mt{s}.google.com/vt/lyrs=r&x={x}&y={y}&z={z}&hl=ko', {
            attribution: '&copy; Google', subdomains: '0123', maxZoom: 20
        }).addTo(map);
        const markerGroup = L.markerClusterGroup({
            maxClusterRadius: 50,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            chunkedLoading: true
        }).addTo(map);

        const sidebar = document.getElementById('sidebar');
        const mapEl = document.getElementById('map');

        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const searchInput = document.getElementById('searchInput');
        const storeList = document.getElementById('storeList');
        const totalCountEl = document.getElementById('totalCount');
        const districtChips = document.getElementById('districtChips');
        const statusChipsEl = document.getElementById('statusChips');
        const refreshBtn = document.getElementById('refreshBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const listCountEl = document.getElementById('listCount');

        // ── 바텀시트 상태 (모바일) ──
        // peek(기본) → half → full
        let bsState = 'peek'; // 'peek' | 'half' | 'full'

        function setBsState(state) {
            bsState = state;
            sidebar.classList.remove('bs-half', 'bs-full', 'collapsed');
            if (state === 'half') sidebar.classList.add('bs-half');
            else if (state === 'full') sidebar.classList.add('bs-full');
            sidebarOverlay.classList.toggle('active', state === 'full');
        }

        function updateSidebarState() {
            if (isMobile) {
                sidebar.classList.remove('collapsed', 'open');
                mapEl.classList.add('expanded');
                sidebarOverlay.classList.remove('active');
                setBsState(bsState);
            } else {
                sidebar.classList.remove('bs-half', 'bs-full', 'open');
                sidebarOverlay.classList.remove('active');
                sidebar.classList.toggle('collapsed', !sidebarOpen);
                mapEl.classList.toggle('expanded', !sidebarOpen);
                sidebarToggle.style.left = sidebarOpen ? `calc(var(--sidebar-w) + 16px)` : '16px';
            }
            setTimeout(() => map.invalidateSize(), 350);
        }

        // ── 바텀시트 터치 드래그 ──
        (function initBottomSheet() {
            const handle = document.getElementById('bsHandle');
            let startY = 0, startTranslate = 0, dragging = false;

            function getTranslateY() {
                const st = getComputedStyle(sidebar);
                const m = st.transform.match(/matrix.*\((.+)\)/);
                return m ? parseFloat(m[1].split(',')[5]) : 0;
            }

            function onStart(e) {
                if (!isMobile) return;
                dragging = true;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
                startTranslate = getTranslateY();
                sidebar.style.transition = 'none';
            }
            function onMove(e) {
                if (!dragging) return;
                if (e.cancelable) e.preventDefault(); // 바텀시트 드래그 중 스크롤 방지
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                const dy = y - startY;
                const newY = Math.max(0, startTranslate + dy);
                sidebar.style.transform = `translateY(${newY}px)`;
            }
            function onEnd() {
                if (!dragging) return;
                dragging = false;
                sidebar.style.transition = '';
                sidebar.style.transform = '';
                const cur = getTranslateY();
                const h = sidebar.offsetHeight;
                const ratio = cur / h;

                // 스냅 포인트 결정
                if (ratio < 0.2) setBsState('full');
                else if (ratio < 0.6) setBsState('half');
                else setBsState('peek');
            }

            handle.addEventListener('touchstart', onStart, { passive: false });
            handle.addEventListener('touchmove', onMove, { passive: false });
            handle.addEventListener('touchend', onEnd);
            handle.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        })();

        sidebarToggle.addEventListener('click', () => {
            if (isMobile) {
                // 모바일: peek→half→full 순환
                if (bsState === 'peek') setBsState('half');
                else if (bsState === 'half') setBsState('full');
                else setBsState('peek');
            } else {
                sidebarOpen = !sidebarOpen; updateSidebarState();
            }
        });
        sidebarOverlay.addEventListener('click', () => {
            if (isMobile) { setBsState('peek'); }
            else { sidebarOpen = false; updateSidebarState(); }
        });
        window.addEventListener('resize', () => {
            const wasMobile = isMobile;
            isMobile = window.innerWidth <= 768;
            if (isMobile && !wasMobile) { bsState = 'peek'; }
            if (!isMobile && wasMobile) { sidebarOpen = true; }
            updateSidebarState();
        });

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function getLastVisit(s) {
            if (!s.visits || !s.visits.length) return null;
            return [...s.visits].sort((a,b) => new Date(b.date||b.visited_at||0) - new Date(a.date||a.visited_at||0))[0];
        }
        function fmtDate(d) { if (!d) return ''; const x = new Date(d); return isNaN(x) ? d : `${String(x.getMonth()+1).padStart(2,'0')}.${String(x.getDate()).padStart(2,'0')}`; }

        function getDaysAgo(store) {
            const lv = getLastVisit(store);
            let baseDate = lv ? (lv.date || lv.visited_at) : store.created_at;
            if (!baseDate) return null;
            const d = new Date(baseDate);
            if (isNaN(d)) return null;
            const now = new Date(); now.setHours(0,0,0,0); d.setHours(0,0,0,0);
            return Math.floor((now - d) / (1000 * 60 * 60 * 24));
        }

        function sortStores(arr, mode) {
            if (mode === 'name') arr.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
            else if (mode === 'oldest') arr.sort((a, b) => {
                const da = getDaysAgo(a), db = getDaysAgo(b);
                return (db === null ? -1 : db) - (da === null ? -1 : da);
            });
            else if (mode === 'recent') arr.sort((a, b) => {
                const da = getDaysAgo(a), db = getDaysAgo(b);
                return (da === null ? 99999 : da) - (db === null ? 99999 : db);
            });
        }

        function getDaysAgoColor(days) {
            if (days === null) return '#94a3b8';
            if (days >= 30) return '#dc2626';
            if (days >= 14) return '#f59e0b';
            if (days >= 7)  return '#eab308';
            return '#16a34a';
        }

        // ── KPI ──
        function updateKPI(stores) {
            const total = stores.length;
            let noContact = 0;
            stores.forEach(s => { if (getStoreStatus(s) === '미컨택') noContact++; });
            const contacted = total - noContact;
            const rate = total ? Math.round((contacted / total) * 100) : 0;

            document.getElementById('kpiTotal').textContent = total;
            document.getElementById('kpiContacted').textContent = contacted;
            document.getElementById('kpiNoContact').textContent = noContact;
            document.getElementById('kpiRate').textContent = rate + '%';
            // peek 미니 KPI (모바일)
            const pt = document.getElementById('peekTotal');
            if (pt) { pt.textContent = total; document.getElementById('peekVisited').textContent = contacted; document.getElementById('peekUnvisited').textContent = noContact; }
        }

        // ── Marker ──
        function createMarker(store) {
            const personal = store.name==='집'||store.name==='회사';
            const status = personal ? 'personal' : getStoreStatus(store);
            const iconSize = personal ? [22, 28] : [30, 38];
            const iconAnchor = personal ? [11, 28] : [15, 38];
            const popupAnchor = personal ? [0, -26] : [0, -36];

            const divIcon = L.divIcon({
                html: buildMarkerHtml(store),
                className: '',
                iconSize: iconSize,
                iconAnchor: iconAnchor,
                popupAnchor: popupAnchor
            });

            const m = L.marker([store.lat, store.lng], { icon: divIcon });
            m._storeId = store.id;
            m._status = status;

            const visits = [...(store.visits||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
            const statusLabel = status === 'personal' ? '' : status;
            let vHtml;
            if (visits.length) {
                vHtml = `<div class="pop-section-label">활동 기록</div><div class="pop-visits">${visits.map(v => {
                    const rawR = v.result||'기타', r = STATUS_MAP[rawR] || (VALID_STATUSES.includes(rawR) ? rawR : '미컨택');
                    const memo = v.memo ? `<span class="pop-v-memo">${escapeHtml(v.memo)}</span>` : '';
                    return `<div class="pop-v"><div class="pop-v-top"><span class="pop-v-date">${fmtDate(v.date||v.visited_at)}</span><span class="badge badge-${r}"><span class="badge-dot"></span>${escapeHtml(r)}</span></div>${memo}</div>`;
                }).join('')}</div>`;
            } else {
                vHtml = `<div class="pop-section-label">방문 기록</div><div class="pop-empty"><span class="badge badge-미컨택"><span class="badge-dot"></span>미컨택</span></div>`;
            }

            const statusBadge = statusLabel ? `<span class="badge badge-${statusLabel}" style="margin-left:auto;"><span class="badge-dot"></span>${escapeHtml(statusLabel)}</span>` : '';
            const naviHtml = `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:flex;gap:6px;">
    <a href="https://map.naver.com/v5/directions/-/${store.lng},${store.lat},${encodeURIComponent(store.name)}/-/car" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;padding:10px;background:#03C75A;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">네이버</a>
    <a href="tmap://route?goalx=${store.lng}&goaly=${store.lat}&goalname=${encodeURIComponent(store.name)}" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;padding:10px;background:#EF4444;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">티맵</a>
</div>
<button onclick="openDetail('${store.id}')" style="width:100%;margin-top:8px;padding:12px;background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;border:none;border-radius:8px;font:700 14px/1 inherit;cursor:pointer;box-shadow:0 2px 8px rgba(79,70,229,.3);">상세 / 수정</button>`;
            const contactTags = [
                store.contact_email ? '<span style="display:inline-block;padding:2px 6px;background:#dbeafe;color:#1d4ed8;border-radius:4px;font-size:10px;font-weight:600;">이메일</span>' : '',
                store.contact_linkedin ? '<span style="display:inline-block;padding:2px 6px;background:#e0e7ff;color:#4338ca;border-radius:4px;font-size:10px;font-weight:600;">링크드인</span>' : '',
                store.contact_remember ? '<span style="display:inline-block;padding:2px 6px;background:#fef3c7;color:#92400e;border-radius:4px;font-size:10px;font-weight:600;">리멤버</span>' : '',
                store.contact_intro ? '<span style="display:inline-block;padding:2px 6px;background:#d1fae5;color:#065f46;border-radius:4px;font-size:10px;font-weight:600;">소개</span>' : '',
            ].filter(Boolean).join(' ');
            const contactHtml = contactTags ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">${contactTags}</div>` : '';
            m.bindPopup(`<div class="pop-head"><div style="display:flex;align-items:center;gap:8px;"><div class="pop-name" style="flex:1;min-width:0;">${escapeHtml(store.name)}</div>${statusBadge}</div><div class="pop-addr">${escapeHtml(store.address||'')}</div>${contactHtml}</div><div class="pop-body">${store.memo?`<div class="pop-memo">${escapeHtml(store.memo)}</div>`:''}${vHtml}${naviHtml}</div>`, { maxWidth: 400 });

            m.bindTooltip(store.name, { direction:'top', offset:[0,-6], className:'premium-tooltip' });
            return m;
        }

        let hlId = null;
        function hlMarker(id) {
            if (hlId && markers[hlId]) {
                const prevEl = markers[hlId].getElement();
                if (prevEl) { const w = prevEl.querySelector('.cm-wrapper'); if (w) w.classList.remove('active'); }
                markers[hlId].setZIndexOffset(0);
            }
            hlId = id;
            if (id && markers[id]) {
                const el = markers[id].getElement();
                if (el) { const w = el.querySelector('.cm-wrapper'); if (w) w.classList.add('active'); }
                markers[id].setZIndexOffset(1000);
            }
        }

        // 상태+검색+즐겨찾기 필터 (마커용: 지역필터 제외)
        function getFilteredForMap() {
            return allStores.filter(s => {
                if (s.showOnMap === false) return false;
                if (filterStarred && !s.starred) return false;
                if (activeStatus) { if (getStoreStatus(s) !== activeStatus) return false; }
                if (searchQuery) { const q = searchQuery.toLowerCase(); return s.name.toLowerCase().includes(q) || (s.address||'').toLowerCase().includes(q); }
                return true;
            });
        }
        // 전체 필터 (리스트용: 지역 포함) + 정렬
        function getFiltered() {
            let result = getFilteredForMap().filter(s => {
                if (activeDistrict && s.district !== activeDistrict) return false;
                return true;
            });
            sortStores(result, sortMode);
            return result;
        }

        function render() {
            // 마커: 모든 스토어 표시 (상태/검색만 필터)
            const mapStores = getFilteredForMap();
            markerGroup.clearLayers(); markers = {};
            mapStores.forEach(s => { const m = createMarker(s); m.addTo(markerGroup); markers[s.id]=m; });

            // 줌: 지역 선택 시 해당 지역으로, 아니면 전체
            const zoomTarget = activeDistrict
                ? mapStores.filter(s => s.district === activeDistrict)
                : mapStores;
            const bounds = zoomTarget.map(s => [s.lat, s.lng]);
            if (bounds.length) map.fitBounds(bounds, { padding: [60,60], maxZoom: activeDistrict ? 15 : 13 });

            // 리스트: 지역+상태+검색 전체 필터
            const f = getFiltered();
            document.getElementById('totalCountBadge').textContent = allStores.length;
            totalCountEl.innerHTML = `<span class="sb-count-badge">${allStores.length}</span> 개 등록`;
            listCountEl.textContent = `${f.length}건`;
            updateKPI(f);

            if (!f.length) {
                storeList.innerHTML = allStores.length === 0
                    ? `<div class="sb-empty"><div class="sb-empty-icon">&#x1F4CD;</div><div class="sb-empty-text">가맹점을 추가해주세요</div><div class="sb-empty-sub">가맹점 등록 페이지에서 추가할 수 있습니다</div></div>`
                    : `<div class="sb-empty"><div class="sb-empty-icon">&#x1F50D;</div><div class="sb-empty-text">검색 결과가 없습니다</div><div class="sb-empty-sub">다른 검색어나 지역을 선택해보세요</div></div>`;
                return;
            }

            storeList.innerHTML = f.map(s => {
                const lv = getLastVisit(s), vc = (s.visits||[]).length;
                const status = getStoreStatus(s);
                let tag;
                if (lv) {
                    tag = `<span class="badge badge-${status}"><span class="badge-dot"></span>${escapeHtml(status)}</span><span class="s-date">${fmtDate(lv.date||lv.visited_at)}</span>`;
                } else {
                    tag = `<span class="badge badge-미컨택"><span class="badge-dot"></span>미컨택</span>`;
                }
                const daysAgo = getDaysAgo(s);
                const daysColor = getDaysAgoColor(daysAgo);
                const daysLabel = daysAgo !== null ? `<span style="font-size:10px;font-weight:700;color:${daysColor};margin-left:auto;white-space:nowrap;">${daysAgo}일</span>` : '';
                const starCls = s.starred ? 'starred' : '';
                const starIcon = s.starred ? '★' : '☆';
                const cTags = [s.contact_email?'메일':'',s.contact_linkedin?'LI':'',s.contact_remember?'리멤':'',s.contact_intro?'소개':''].filter(Boolean);
                const cHtml = cTags.length ? `<div style="display:flex;gap:3px;margin-top:3px;">${cTags.map(t=>`<span style="padding:1px 4px;background:${t==='메일'?'#dbeafe':t==='LI'?'#e0e7ff':t==='리멤'?'#fef3c7':'#d1fae5'};color:${t==='메일'?'#1d4ed8':t==='LI'?'#4338ca':t==='리멤'?'#92400e':'#065f46'};border-radius:3px;font-size:9px;font-weight:600;">${t}</span>`).join('')}</div>` : '';
                const mapIcon = s.showOnMap === false ? '<span title="지도 숨김" style="font-size:10px;color:var(--muted-fg);margin-left:4px;">⊘</span>' : '';
                return `<div class="s-card${activeCardId===s.id?' active':''}" data-id="${s.id}" data-status="${status}"><div class="s-card-top"><button class="s-card-star ${starCls}" data-star-id="${s.id}" style="width:22px;height:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:${s.starred?'#f59e0b':'#d1d5db'};font-size:15px;flex-shrink:0;border:none;background:none;padding:0;transition:all .15s;">${starIcon}</button><div class="s-card-name">${escapeHtml(s.name)}${mapIcon}</div><div class="s-card-footer">${tag}${daysLabel}</div></div><div class="s-card-addr">${escapeHtml(s.address||'')}</div>${cHtml}${lv&&lv.memo?`<div class="s-card-memo">${escapeHtml(lv.memo)}</div>`:''}</div>`;
            }).join('');

            // 별표 클릭 이벤트
            storeList.querySelectorAll('.s-card-star, [data-star-id]').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const sid = btn.dataset.starId;
                    try {
                        const res = await fetch(`/api/stores/${sid}/star`, {method:'POST'});
                        if (res.ok) {
                            const data = await res.json();
                            const store = allStores.find(x=>x.id===sid);
                            if (store) store.starred = data.starred;
                            render();
                        }
                    } catch(err) { console.error('즐겨찾기 토글 실패', err); showToast('즐겨찾기 저장 실패', true); }
                });
            });
            storeList.querySelectorAll('.s-card').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id, s = allStores.find(x=>x.id===id), m = markers[id];
                    if (!s||!m) return;
                    activeCardId = id;
                    storeList.querySelectorAll('.s-card').forEach(c=>c.classList.remove('active'));
                    el.classList.add('active');
                    map.flyTo([s.lat,s.lng], 15, { duration:.8 });
                    hlMarker(id);
                    if (isMobile) { setBsState('peek'); }
                    setTimeout(()=>openDetail(id), 300);
                });
            });
        }

        function renderStatusChips() {
            const sc = {};
            let starCount = 0;
            allStores.forEach(s => { const st = getStoreStatus(s); sc[st] = (sc[st]||0)+1; if(s.starred) starCount++; });
            const order = ['미컨택','명함전달','미팅대기','미팅완료'];
            let h = `<button class="sb-chip${activeStatus===null&&!filterStarred?' active':''}" data-s="__all__">전체 <span class="sb-chip-n">${allStores.length}</span></button>`;
            h += `<button class="sb-chip${filterStarred?' active':''}" data-s="__star__" style="${filterStarred?'background:var(--warning);border-color:var(--warning);color:#fff;':'color:#f59e0b;border-color:#fde68a;'}">★ <span class="sb-chip-n">${starCount}</span></button>`;
            order.forEach(st => {
                if (sc[st]) {
                    h += `<button class="sb-chip sb-chip-status${activeStatus===st?' active':''}" data-s="${st}" data-status="${st}">${st} <span class="sb-chip-n">${sc[st]}</span></button>`;
                }
            });
            statusChipsEl.innerHTML = h;
            statusChipsEl.querySelectorAll('.sb-chip').forEach(c => c.addEventListener('click', () => {
                if (c.dataset.s === '__star__') {
                    filterStarred = !filterStarred;
                    if (filterStarred) activeStatus = null;
                } else if (c.dataset.s === '__all__') {
                    activeStatus = null;
                    filterStarred = false;
                } else {
                    activeStatus = c.dataset.s;
                    filterStarred = false;
                }
                renderStatusChips(); render();
            }));
        }

        function renderChips() {
            const dc = {};
            allStores.forEach(s => { const d=s.district||'기타'; dc[d]=(dc[d]||0)+1; });
            const ds = Object.keys(dc).sort((a,b)=>a==='기타'?1:b==='기타'?-1:a.localeCompare(b,'ko'));
            let h = `<button class="sb-chip${activeDistrict===null?' active':''}" data-d="__all__">전체 <span class="sb-chip-n">${allStores.length}</span></button>`;
            h += ds.map(d=>`<button class="sb-chip${activeDistrict===d?' active':''}" data-d="${escapeHtml(d)}">${escapeHtml(d)} <span class="sb-chip-n">${dc[d]}</span></button>`).join('');
            districtChips.innerHTML = h;
            districtChips.querySelectorAll('.sb-chip').forEach(c => c.addEventListener('click', ()=>{
                activeDistrict = c.dataset.d==='__all__' ? null : c.dataset.d;
                districtChips.querySelectorAll('.sb-chip').forEach(x=>x.classList.remove('active'));
                c.classList.add('active'); render();
            }));
        }

        let st; searchInput.addEventListener('input', ()=>{ clearTimeout(st); st=setTimeout(()=>{ searchQuery=searchInput.value.trim(); render(); },200); });
        document.getElementById('sortSelect').addEventListener('change', (e) => { sortMode = e.target.value; render(); });
        // 모바일: 검색 포커스 시 바텀시트 자동 올림
        searchInput.addEventListener('focus', () => { if (isMobile && bsState === 'peek') setBsState('full'); });

        // ══════════════════════════════════════
        //  FULL LIST PANEL
        // ══════════════════════════════════════
        function openFullList() {
            document.getElementById('flOverlay').classList.add('active');
            const panel = document.getElementById('flPanel');
            panel.classList.add('open');
            // 지역구 옵션 업데이트
            const dSel = document.getElementById('flDistrict');
            const districts = [...new Set(allStores.map(s=>s.district).filter(Boolean))].sort((a,b)=>a==='기타'?1:b==='기타'?-1:a.localeCompare(b,'ko'));
            dSel.innerHTML = '<option value="">전체 지역</option>' + districts.map(d=>`<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
            renderFullList();
            setTimeout(()=>document.getElementById('flSearch').focus(), 300);
        }
        function closeFullList() {
            document.getElementById('flOverlay').classList.remove('active');
            document.getElementById('flPanel').classList.remove('open');
        }
        function renderFullList() {
            const q = (document.getElementById('flSearch').value||'').trim().toLowerCase();
            const sf = document.getElementById('flStatus').value;
            const df = document.getElementById('flDistrict').value;
            const sm = document.getElementById('flSort').value;

            let list = allStores.slice();
            if (q) list = list.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.address||'').toLowerCase().includes(q));
            if (sf) list = list.filter(s=>getStoreStatus(s)===sf);
            if (df) list = list.filter(s=>s.district===df);

            sortStores(list, sm);

            document.getElementById('flCount').textContent = list.length + '건';
            const body = document.getElementById('flBody');

            if (!list.length) {
                body.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--muted-fg);font-size:14px;">조건에 맞는 매장이 없습니다</div>';
                return;
            }

            body.innerHTML = list.map(s => {
                const status = getStoreStatus(s);
                const lv = getLastVisit(s);
                const days = getDaysAgo(s);
                const daysColor = getDaysAgoColor(days);
                const vc = (s.visits||[]).length;
                const starIcon = s.starred ? '<span style="color:#f59e0b;margin-right:4px;">★</span>' : '';

                let visitInfo = '';
                if (lv) {
                    visitInfo = `<span class="badge badge-${status}"><span class="badge-dot"></span>${escapeHtml(status)}</span>`;
                    if (lv.memo) visitInfo += `<div class="fl-card-memo">${escapeHtml(lv.memo)}</div>`;
                    // 방문수 표시 제거
                } else {
                    visitInfo = '<span class="badge badge-미컨택"><span class="badge-dot"></span>미컨택</span>';
                }

                return `<div class="fl-card" data-id="${s.id}" data-status="${status}">
                    <div class="fl-card-main">
                        <div class="fl-card-name">${starIcon}${escapeHtml(s.name)}</div>
                        <div class="fl-card-addr">${escapeHtml(s.address||'')} · ${escapeHtml(s.district||'')}</div>
                        <div style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">${visitInfo}</div>
                    </div>
                    <div class="fl-card-meta">
                        <span class="fl-card-days" style="color:${daysColor}">${days!==null?days+'일':''}</span>
                    </div>
                </div>`;
            }).join('');

            body.querySelectorAll('.fl-card').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    const s = allStores.find(x=>x.id===id);
                    const m = markers[id];
                    if (!s||!m) return;
                    closeFullList();
                    activeCardId = id;
                    map.flyTo([s.lat,s.lng], 16, {duration:.8});
                    setTimeout(()=>m.openPopup(), 600);
                    hlMarker(id);
                    render();
                });
            });
        }

        // ESC키로 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('flPanel').classList.contains('open')) closeFullList();
        });

        // ══════════════════════════════════════
        //  STORE DETAIL PANEL
        // ══════════════════════════════════════
        function showToast(msg, isError) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast' + (isError ? ' toast-error' : '');
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2600);
        }

        // 결과 버튼 그룹 초기화
        const _resultOptions = ['명함전달','미팅대기','미팅완료'];
        function initResultBtnGroup() {
            const g = document.getElementById('dpResultBtnGroup');
            g.innerHTML = _resultOptions.map(r =>
                `<button type="button" data-value="${r}" style="flex:1;min-width:65px;height:36px;border:1px solid var(--border);border-radius:var(--radius);font:600 12px/1 inherit;cursor:pointer;background:var(--bg);color:var(--fg);transition:all .15s;">${r}</button>`
            ).join('');
            g.addEventListener('click', function(e) {
                const btn = e.target.closest('button');
                if (!btn) return;
                document.getElementById('dpVisitResult').value = btn.dataset.value;
                g.querySelectorAll('button').forEach(b => { b.style.background='var(--bg)'; b.style.color='var(--fg)'; b.style.borderColor='var(--border)'; });
                btn.style.background='var(--primary)'; btn.style.color='#fff'; btn.style.borderColor='var(--primary)';
            });
        }
        initResultBtnGroup();
        document.getElementById('dpShowOnMap').addEventListener('change', function() {
            document.getElementById('dpShowOnMapLabel').textContent = this.checked ? '지도에 표시' : '지도에서 숨김';
        });

        function openDetail(storeId) {
            const s = allStores.find(x => x.id === storeId);
            if (!s) return;
            document.getElementById('dpId').value = s.id;
            document.getElementById('dpName').value = s.name || '';
            document.getElementById('dpAddress').value = s.address || '';
            document.getElementById('dpMemo').value = s.memo || '';
            document.getElementById('dpShowOnMap').checked = s.showOnMap !== false;
            document.getElementById('dpShowOnMapLabel').textContent = (s.showOnMap !== false) ? '지도에 표시' : '지도에서 숨김';
            document.getElementById('dpTitle').textContent = s.name || '가맹점 상세';
            // 상태배지
            const status = getStoreStatus(s);
            const badge = document.getElementById('dpStatusBadge');
            badge.className = 'badge badge-' + status;
            badge.innerHTML = '<span class="badge-dot"></span>' + escapeHtml(status);
            document.getElementById('dpVisitDate').valueAsDate = new Date();
            document.getElementById('dpVisitMemo').value = '';
            // 결과 버튼 초기화
            document.getElementById('dpVisitResult').value = '명함전달';
            document.querySelectorAll('#dpResultBtnGroup button').forEach(b => {
                const d = b.dataset.value === '명함전달';
                b.style.background = d ? 'var(--primary)' : 'var(--bg)';
                b.style.color = d ? '#fff' : 'var(--fg)';
                b.style.borderColor = d ? 'var(--primary)' : 'var(--border)';
            });
            renderDetailVisits(s);
            document.getElementById('detailOverlay').classList.add('active');
            document.getElementById('detailPanel').classList.add('open');
            map.closePopup();
        }
        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('active');
            document.getElementById('detailPanel').classList.remove('open');
        }
        function renderDetailVisits(store) {
            const list = document.getElementById('dpVisitList');
            const visits = [...(store.visits || [])].sort((a,b) => (b.date||'').localeCompare(a.date||''));
            if (!visits.length) {
                list.innerHTML = '<div style="font-size:12px;color:var(--muted-fg);padding:8px 0;">방문 기록이 없습니다.</div>';
                return;
            }
            list.innerHTML = visits.map(v => {
                const rawR = v.result || '기타';
                const r = STATUS_MAP[rawR] || (VALID_STATUSES.includes(rawR) ? rawR : '미컨택');
                return `<div class="dp-visit-item">
                    <div class="dp-visit-top">
                        <span style="color:var(--muted-fg);font-size:11px;">${fmtDate(v.date)}</span>
                        <span class="badge badge-${r}"><span class="badge-dot"></span>${escapeHtml(r)}</span>
                        <button class="dp-visit-del" onclick="deleteDetailVisit('${v.id}')">&times;</button>
                    </div>
                    ${v.memo ? `<div class="dp-visit-memo">${escapeHtml(v.memo)}</div>` : ''}
                </div>`;
            }).join('');
        }
        async function saveDetail() {
            const id = document.getElementById('dpId').value;
            const payload = {
                name: document.getElementById('dpName').value.trim(),
                address: document.getElementById('dpAddress').value.trim(),
                memo: document.getElementById('dpMemo').value.trim(),
                showOnMap: document.getElementById('dpShowOnMap').checked,
            };
            if (!payload.name || !payload.address) { alert('가맹점명과 주소는 필수입니다.'); return; }
            try {
                const res = await fetch(`/api/stores/${id}`, {
                    method: 'PUT', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    showToast('저장되었습니다');
                    closeDetail();
                    await loadStores();
                }
            } catch(e) { showToast('저장 실패', true); }
        }
        async function deleteDetail() {
            if (!confirm('이 가맹점을 삭제하시겠습니까?')) return;
            const id = document.getElementById('dpId').value;
            try {
                const res = await fetch(`/api/stores/${id}`, {method:'DELETE'});
                if (res.ok) { closeDetail(); await loadStores(); }
            } catch(e) { alert('삭제 실패'); }
        }
        async function addDetailVisit() {
            const id = document.getElementById('dpId').value;
            const date = document.getElementById('dpVisitDate').value;
            const result = document.getElementById('dpVisitResult').value;
            const memo = document.getElementById('dpVisitMemo').value.trim();
            if (!date) { alert('날짜를 선택하세요.'); return; }
            try {
                const res = await fetch(`/api/stores/${id}/visits`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({date, result, memo})
                });
                if (res.ok) {
                    document.getElementById('dpVisitMemo').value = '';
                    await loadStores();
                    const s = allStores.find(x => x.id === id);
                    if (s) renderDetailVisits(s);
                }
            } catch(e) { alert('방문 추가 실패'); }
        }
        async function deleteDetailVisit(visitId) {
            const id = document.getElementById('dpId').value;
            try {
                const res = await fetch(`/api/stores/${id}/visits/${visitId}`, {method:'DELETE'});
                if (res.ok) {
                    await loadStores();
                    const s = allStores.find(x => x.id === id);
                    if (s) renderDetailVisits(s);
                }
            } catch(e) { alert('삭제 실패'); }
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('detailPanel').classList.contains('open')) closeDetail();
        });

        async function loadStores() {
            loadingOverlay.style.display = 'flex';
            try {
                const res = await fetch('/api/stores'); if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                allStores = (data.stores||data||[]).map(s=>({...s, id:String(s.id), district:s.district||'기타', lat:parseFloat(s.lat||s.latitude), lng:parseFloat(s.lng||s.longitude||s.lon)})).filter(s=>!isNaN(s.lat)&&!isNaN(s.lng));
                activeDistrict=null; activeStatus=null; searchQuery=''; searchInput.value=''; activeCardId=null;
                renderStatusChips(); renderChips(); render();
            } catch(e) { console.error(e); allStores=[]; renderStatusChips(); renderChips(); render(); alert('데이터를 불러오지 못했습니다. 새로고침해주세요.'); }
            finally { loadingOverlay.style.display='none'; }
        }

        refreshBtn.addEventListener('click', loadStores);
        map.on('click', ()=>{ activeCardId=null; hlMarker(null); storeList.querySelectorAll('.s-card').forEach(c=>c.classList.remove('active')); });

        if (isMobile) { sidebarOpen = false; bsState = 'peek'; }
        updateSidebarState();
        loadStores();
        // superadmin이면 승인 버튼 표시
        fetch('/auth/me').then(r=>{
            if(!r.ok) { location.href='/login'; return Promise.reject(); }
            return r.json();
        }).then(u=>{
            if(u && u.role==='superadmin') document.getElementById('approveBtn').style.display='flex';
        }).catch(()=>{});
    </script>

    <button id="gpsBtn" style="position:fixed;bottom:90px;right:20px;z-index:99999;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(79,70,229,.45),0 1px 3px rgba(0,0,0,.12);" title="내 위치 찾기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line></svg>
    </button>
    <script>
        (function(){
            var btn = document.getElementById('gpsBtn');
            var gpsMarker = null;
            var isLoading = false;

            // HTTPS/Localhost 체크
            var isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            if (!isSecure) {
                console.warn('[GPS] 이 페이지는 보안 연결(HTTPS)이 아닙니다. Geolocation API가 작동하지 않을 수 있습니다. 현재: ' + location.protocol + '//' + location.hostname);
            }

            function setLoading(on) {
                isLoading = on;
                btn.style.opacity = on ? '0.6' : '1';
                btn.style.pointerEvents = on ? 'none' : 'auto';
                if (on) {
                    btn.style.animation = 'gps-pulse-btn 0.8s ease-in-out infinite alternate';
                } else {
                    btn.style.animation = 'none';
                }
            }

            btn.addEventListener('click', function(){
                if (isLoading) return;

                // Geolocation API 지원 체크
                if (!navigator.geolocation) {
                    alert('이 브라우저에서는 위치 서비스를 지원하지 않습니다.');
                    return;
                }

                // HTTPS 아닌 경우 경고
                if (!isSecure) {
                    alert('GPS 기능은 HTTPS 또는 localhost에서만 작동합니다.\n현재 주소: ' + location.href);
                    return;
                }

                setLoading(true);

                // 10초 안전 타임아웃 (API 타임아웃과 별도)
                var safetyTimeout = setTimeout(function(){
                    setLoading(false);
                    alert('위치 요청 시간이 초과되었습니다. (10초)\n\n확인사항:\n1. Windows 설정 > 개인 정보 > 위치 서비스 ON\n2. 브라우저 위치 권한 허용');
                }, 12000);

                try {
                    navigator.geolocation.getCurrentPosition(
                        function(pos){
                            clearTimeout(safetyTimeout);
                            try {
                                var lat = pos.coords.latitude;
                                var lng = pos.coords.longitude;
                                console.log('[GPS] 위치 획득 성공:', lat, lng);

                                if (gpsMarker) {
                                    gpsMarker.setLatLng([lat, lng]);
                                } else {
                                    var icon = L.divIcon({
                                        html: '<div class="gps-marker-wrap"><div class="gps-label">내 위치</div><div class="gps-dot-container"><div class="gps-dot-ring"></div><div class="gps-dot-ring2"></div><div class="gps-dot-inner"></div></div></div>',
                                        className: '',
                                        iconSize: [48, 72],
                                        iconAnchor: [24, 48]
                                    });
                                    gpsMarker = L.marker([lat, lng], { icon: icon, zIndexOffset: 9999 }).addTo(map);
                                }
                                map.flyTo([lat, lng], 16, { duration: 1.2 });
                            } catch(e) {
                                console.error('[GPS] 마커 생성 에러:', e);
                                alert('위치를 지도에 표시하는 중 오류가 발생했습니다.');
                            } finally {
                                setLoading(false);
                            }
                        },
                        function(err){
                            clearTimeout(safetyTimeout);
                            console.error('[GPS] 에러 코드:', err.code, err.message);
                            var msg;
                            switch(err.code) {
                                case 1: msg = '위치 권한이 거부되었습니다.\n\n브라우저 주소창 왼쪽의 자물쇠 아이콘 > 위치 > 허용으로 변경해주세요.'; break;
                                case 2: msg = '위치 정보를 사용할 수 없습니다.\n\nWindows 설정 > 개인 정보 > 위치에서 위치 서비스를 켜주세요.'; break;
                                case 3: msg = '위치 요청 시간이 초과되었습니다.\n잠시 후 다시 시도해주세요.'; break;
                                default: msg = '알 수 없는 오류가 발생했습니다. (' + err.message + ')';
                            }
                            alert(msg);
                            setLoading(false);
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
                    );
                } catch(e) {
                    clearTimeout(safetyTimeout);
                    console.error('[GPS] 예외 발생:', e);
                    alert('위치 서비스 호출 중 오류가 발생했습니다: ' + e.message);
                    setLoading(false);
                }
            });
        })();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(err => console.log('SW 등록 실패:', err));
        }
    </script>
