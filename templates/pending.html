<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Point3 CRM — 승인 대기</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-glow: rgba(79, 70, 229, 0.25);
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --fg: #0f172a;
      --fg-secondary: #1e293b;
      --fg-muted: #94a3b8;
      --border: #e2e8f0;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.08) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }
    .container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }
    .card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 52px 36px 40px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
      border: 1px solid var(--border);
      text-align: center;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 36px;
      letter-spacing: -0.5px;
    }
    .logo span { color: #818cf8; font-weight: 600; }

    /* CSS 시계 아이콘 */
    .clock-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 28px;
      position: relative;
      border: 4px solid #a5b4fc;
      border-radius: 50%;
      background: #eef2ff;
      transition: background var(--transition), border-color var(--transition);
    }
    .clock-icon::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 22px;
      background: var(--primary);
      border-radius: 2px;
      transform-origin: bottom center;
      transform: translate(-50%, -100%) rotate(0deg);
    }
    .clock-icon::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 16px;
      background: #6366f1;
      border-radius: 2px;
      transform-origin: bottom center;
      transform: translate(-50%, -100%) rotate(90deg);
    }
    .clock-dot {
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @media (prefers-reduced-motion: reduce) {
      .clock-icon { animation: none !important; }
    }
    .clock-icon { animation: pulse 2.5s ease-in-out infinite; }

    .main-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--fg-secondary);
      margin-bottom: 12px;
      line-height: 1.5;
      transition: color var(--transition);
    }
    .sub-text {
      font-size: 14px;
      color: var(--fg-muted);
      margin-bottom: 32px;
      transition: color var(--transition);
    }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition), transform 0.1s ease;
    }
    .btn:hover { background: var(--primary-hover); box-shadow: 0 4px 16px var(--primary-glow); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; box-shadow: none; }

    .status-msg {
      margin-top: 14px;
      font-size: 13px;
      color: #f59e0b;
      min-height: 20px;
      font-weight: 500;
      transition: color var(--transition);
    }
    .status-msg.error { color: #ef4444; }

    .logout-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 14px;
      color: var(--fg-muted);
      text-decoration: none;
      transition: color var(--transition);
    }
    .logout-link:hover { color: #64748b; }

    .footer-text {
      margin-top: 32px;
      font-size: 12px;
      color: #cbd5e1;
      transition: color var(--transition);
    }

    @media (max-width: 480px) {
      .card { padding: 40px 24px 32px; }
      .main-text { font-size: 18px; }
    }

    /* Dark mode */
    body.dark {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --fg: #f1f5f9;
      --fg-secondary: #e2e8f0;
      --fg-muted: #64748b;
      --border: #334155;
      --primary-glow: rgba(99, 102, 241, 0.3);
      background-image: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 60%);
    }
    body.dark .clock-icon { background: #312e81; border-color: #6366f1; }
    body.dark .footer-text { color: #475569; }
    body.dark .btn:disabled { background: #3730a3; }

    @media (prefers-color-scheme: dark) {
      body:not(.light) {
        --bg: #0f172a;
        --bg-card: #1e293b;
        --fg: #f1f5f9;
        --fg-secondary: #e2e8f0;
        --fg-muted: #64748b;
        --border: #334155;
        --primary-glow: rgba(99, 102, 241, 0.3);
        background-image: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 60%);
      }
      body:not(.light) .clock-icon { background: #312e81; border-color: #6366f1; }
      body:not(.light) .footer-text { color: #475569; }
      body:not(.light) .btn:disabled { background: #3730a3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">Point3 <span>CRM</span></div>

      <div class="clock-icon">
        <div class="clock-dot"></div>
      </div>

      <div class="main-text">관리자의 팀 승인을<br>기다려주세요.</div>
      <div class="sub-text">승인이 완료되면 서비스를 이용할 수 있습니다.</div>

      <button class="btn" id="checkBtn" onclick="checkApproval()">승인 확인</button>
      <div class="status-msg" id="statusMsg"></div>

      <a href="/auth/logout" class="logout-link">로그아웃</a>

      <div class="footer-text">문의: 관리자에게 연락하세요</div>
    </div>
  </div>

  <script>
    const checkBtn = document.getElementById('checkBtn');
    const statusMsg = document.getElementById('statusMsg');

    async function checkApproval() {
      checkBtn.disabled = true;
      checkBtn.textContent = '확인 중...';
      statusMsg.textContent = '';
      statusMsg.className = 'status-msg';

      try {
        const res = await fetch('/auth/me');
        if (!res.ok) throw new Error('서버 오류가 발생했습니다.');
        const data = await res.json();

        if (data.isApproved) {
          statusMsg.textContent = '승인 완료! 이동합니다...';
          statusMsg.style.color = '#059669';
          setTimeout(() => { location.href = '/'; }, 500);
        } else {
          statusMsg.textContent = '아직 승인되지 않았습니다. 자동으로 확인 중...';
        }
      } catch (err) {
        statusMsg.textContent = err.message;
        statusMsg.className = 'status-msg error';
      } finally {
        checkBtn.disabled = false;
        checkBtn.textContent = '승인 확인';
      }
    }

    // 5초마다 자동 확인
    setInterval(async () => {
      try {
        const res = await fetch('/auth/me');
        if (res.ok) {
          const data = await res.json();
          if (data.isApproved) location.href = '/';
        }
      } catch(e) {}
    }, 5000);
  </script>
</body>
</html>
