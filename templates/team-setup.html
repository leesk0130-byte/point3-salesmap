<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Point3 CRM — 팀 설정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #4f46e5;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .logo span {
      color: #818cf8;
      font-weight: 600;
    }
    .subtitle {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 40px;
    }
    .label {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .input-field {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      background: #f8fafc;
    }
    .input-field:focus {
      border-color: #4f46e5;
      background: #fff;
    }
    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      background: #4f46e5;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: #4338ca; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }
    .error-msg {
      margin-top: 14px;
      font-size: 13px;
      color: #ef4444;
      min-height: 20px;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">Point3 <span>CRM</span></div>
      <div class="subtitle">영업 관리 시스템</div>
      <div class="label">소속 팀 이름을 입력하세요</div>
      <input type="text" class="input-field" id="teamName" placeholder="예) 영업1팀" autocomplete="off">
      <button class="btn" id="submitBtn" onclick="submitTeam()">설정 완료</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    const input = document.getElementById('teamName');
    const btn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitTeam();
    });

    async function submitTeam() {
      const teamName = input.value.trim();
      if (!teamName) {
        errorMsg.textContent = '팀 이름을 입력해주세요.';
        input.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = '설정 중...';
      errorMsg.textContent = '';

      try {
        const res = await fetch('/auth/set-team', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ teamName })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.message || '팀 설정에 실패했습니다.');
        }

        location.href = '/pending';
      } catch (err) {
        errorMsg.textContent = err.message;
        btn.disabled = false;
        btn.textContent = '설정 완료';
      }
    }
  </script>
</body>
</html>
