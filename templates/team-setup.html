<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ team_name }} CRM — 팀 설정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-glow: rgba(79, 70, 229, 0.25);
      --bg: #f8fafc;
      --bg-card: #ffffff;
      --fg: #0f172a;
      --fg-secondary: #1e293b;
      --fg-muted: #94a3b8;
      --border: #e2e8f0;
      --input-bg: #f8fafc;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.08) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 48px 36px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
      border: 1px solid var(--border);
      text-align: center;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .logo span {
      color: #818cf8;
      font-weight: 600;
    }
    .subtitle {
      font-size: 15px;
      color: var(--fg-muted);
      margin-bottom: 40px;
      transition: color var(--transition);
    }
    .label {
      font-size: 16px;
      font-weight: 600;
      color: var(--fg-secondary);
      margin-bottom: 20px;
      line-height: 1.5;
      transition: color var(--transition);
    }
    .input-field {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      border: 2px solid var(--border);
      border-radius: 10px;
      outline: none;
      color: var(--fg-secondary);
      background: var(--input-bg);
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition);
    }
    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
      background: var(--bg-card);
    }
    .input-field::placeholder { color: var(--fg-muted); }
    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition), transform 0.1s ease;
    }
    .btn:hover { background: var(--primary-hover); box-shadow: 0 4px 16px var(--primary-glow); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
      box-shadow: none;
    }
    .error-msg {
      margin-top: 14px;
      font-size: 13px;
      color: #ef4444;
      min-height: 20px;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }

    /* Dark mode */
    body.dark {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --fg: #f1f5f9;
      --fg-secondary: #e2e8f0;
      --fg-muted: #64748b;
      --border: #334155;
      --input-bg: #0f172a;
      --primary-glow: rgba(99, 102, 241, 0.3);
      background-image: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 60%);
    }
    body.dark .btn:disabled { background: #3730a3; }

    @media (prefers-color-scheme: dark) {
      body:not(.light) {
        --bg: #0f172a;
        --bg-card: #1e293b;
        --fg: #f1f5f9;
        --fg-secondary: #e2e8f0;
        --fg-muted: #64748b;
        --border: #334155;
        --input-bg: #0f172a;
        --primary-glow: rgba(99, 102, 241, 0.3);
        background-image: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 60%);
      }
      body:not(.light) .btn:disabled { background: #3730a3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">{{ team_name or 'Point3' }} <span>CRM</span></div>
      <div class="subtitle">영업 관리 시스템</div>
      <div class="label">소속 팀 이름을 입력하세요</div>
      <input type="text" class="input-field" id="teamName" placeholder="예) 영업1팀" autocomplete="off">
      <button class="btn" id="submitBtn" onclick="submitTeam()">설정 완료</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    const input = document.getElementById('teamName');
    const btn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitTeam();
    });

    async function submitTeam() {
      const teamName = input.value.trim();
      if (!teamName) {
        errorMsg.textContent = '팀 이름을 입력해주세요.';
        input.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = '설정 중...';
      errorMsg.textContent = '';

      try {
        const res = await fetch('/auth/set-team', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ teamName })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.message || '팀 설정에 실패했습니다.');
        }

        location.href = '/pending';
      } catch (err) {
        errorMsg.textContent = err.message;
        btn.disabled = false;
        btn.textContent = '설정 완료';
      }
    }
  </script>
</body>
</html>
